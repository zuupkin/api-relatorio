<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise Executiva | Inteligência Comercial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --surface: #ffffff;
            --background: #F3F4F6;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --ring: rgba(79, 70, 229, 0.2);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            background-image: radial-gradient(#D1D5DB 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text-main);
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--surface);
            padding: 48px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--border);
            position: relative;
            z-index: 10;
        }

        .badge {
            display: inline-block;
            background: #EEF2FF;
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        h1 { 
            margin: 0 0 12px 0; 
            font-size: 32px; 
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text-main);
        }

        p { 
            color: var(--text-muted); 
            margin: 0 0 40px 0; 
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
        }

        /* Área de Upload Estilizada */
        .upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #D1D5DB;
            border-radius: 12px;
            padding: 40px 20px;
            background-color: #F9FAFB;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-area:hover, .upload-area.dragover { 
            border-color: var(--primary); 
            background-color: #EEF2FF;
        }

        .upload-icon {
            color: #9CA3AF;
            margin-bottom: 16px;
            transition: color 0.2s ease;
        }

        .upload-area:hover .upload-icon {
            color: var(--primary);
        }

        #file-name {
            font-size: 15px;
            color: var(--text-main);
        }

        #file-name strong {
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
        }

        #file-name small {
            color: var(--text-muted);
            font-size: 13px;
        }

        input[type="file"] { display: none; }

        /* Botão Principal */
        .btn-submit {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 10px;
            margin-top: 24px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover:not(:disabled) { 
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-submit:focus {
            outline: none;
            box-shadow: 0 0 0 4px var(--ring);
        }

        .btn-submit:disabled { 
            background-color: #D1D5DB; 
            cursor: not-allowed; 
            transform: none;
        }

        /* Loading Animado (Spinner UI) */
        #loading { 
            display: none; 
            margin-top: 24px; 
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(79, 70, 229, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 12px auto;
        }

        .loading-text {
            color: var(--primary);
            font-size: 14px;
            font-weight: 500;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        /* Iframe de Resultado */
        #resultado {
            margin-top: 40px;
            width: 100%;
            max-width: 900px;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            display: none;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* Simulação de barra de janela para o relatório */
        .resultado-header {
            background: #F9FAFB;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between; /* Espalha os itens */
        }

        .janela-controles {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot.r { background: #EF4444; }
        .dot.y { background: #F59E0B; }
        .dot.g { background: #10B981; }

        .header-title {
            margin-left: 10px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }

        /* Estilo do botão de imprimir/PDF */
        .btn-acao {
            background-color: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn-acao:hover {
            background-color: #EEF2FF;
            color: var(--primary);
            border-color: var(--primary);
        }

        #frame-relatorio {
            width: 100%;
            height: 800px;
            border: none;
            background: white;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="badge">Powered by AI</span>
        <h1>Análise Executiva</h1>
        <p>Transforme apresentações brutas em inteligência comercial acionável.</p>

        <label class="upload-area" for="arquivo" id="drop-zone">
            <svg class="upload-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            
            <div id="file-name">
                <strong>Clique para selecionar ou arraste o arquivo</strong>
                <small>Suporta PDF, PNG ou JPEG (Max: 15MB)</small>
            </div>
            <input type="file" id="arquivo" accept=".pdf,.png,.jpg,.jpeg,.pptx">
        </label>

        <button class="btn-submit" id="btn-enviar" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            Gerar Relatório Analítico
        </button>
        
        <div id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Processando motor de inteligência...</div>
        </div>
    </div>

    <div id="resultado">
        <div class="resultado-header">
            <div class="janela-controles">
                <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
                <span class="header-title">Output: Relatório_Executivo.html</span>
            </div>
            
            <button id="btn-imprimir" class="btn-acao">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                Salvar PDF
            </button>
        </div>
        <iframe id="frame-relatorio"></iframe>
    </div>

    <script>
        const fileInput = document.getElementById('arquivo');
        const fileNameDisplay = document.getElementById('file-name');
        const btnEnviar = document.getElementById('btn-enviar');
        const loading = document.getElementById('loading');
        const resultadoContainer = document.getElementById('resultado');
        const frameRelatorio = document.getElementById('frame-relatorio');
        const dropZone = document.getElementById('drop-zone');
        const btnImprimir = document.getElementById('btn-imprimir');

        // Lógica de arrastar e soltar (Drag & Drop UX)
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            fileInput.files = files;
            updateUI(files);
        }

        // Lógica de clique padrão
        fileInput.addEventListener('change', function() {
            updateUI(this.files);
        });

        function updateUI(files) {
            if (files.length > 0) {
                const icon = `<svg class="upload-icon" style="color: var(--primary);" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
                fileNameDisplay.innerHTML = `${icon}<strong>${files[0].name}</strong><small>Pronto para análise</small>`;
                btnEnviar.disabled = false;
            } else {
                const icon = `<svg class="upload-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>`;
                fileNameDisplay.innerHTML = `${icon}<strong>Clique para selecionar ou arraste o arquivo</strong><small>Suporta PDF, PPTX, PNG ou JPEG (Max: 15MB)</small>`;
                btnEnviar.disabled = true;
            }
        }

        // Submissão do arquivo
        btnEnviar.addEventListener('click', async function() {
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            btnEnviar.style.display = 'none';
            loading.style.display = 'block';
            resultadoContainer.style.display = 'none';

            try {
                const response = await fetch(`/gerar-relatorio`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Erro na comunicação com a API.');

                const htmlGerado = await response.text();
                frameRelatorio.srcdoc = htmlGerado;
                resultadoContainer.style.display = 'block';
                
                setTimeout(() => {
                    resultadoContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);

            } catch (error) {
                alert("Ocorreu um erro: " + error.message);
                btnEnviar.style.display = 'flex';
            } finally {
                loading.style.display = 'none';
                if(resultadoContainer.style.display === 'block'){
                    btnEnviar.style.display = 'flex'; 
                    btnEnviar.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Nova Análise';
                    btnEnviar.onclick = () => location.reload();
                }
            }
        });

        // Lógica para Imprimir/Salvar PDF do Iframe
        btnImprimir.addEventListener('click', function() {
            // Garante que o iframe está focado antes de chamar o print
            frameRelatorio.contentWindow.focus();
            frameRelatorio.contentWindow.print();
        });
    </script>
</body>
</html>
