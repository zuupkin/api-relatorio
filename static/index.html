<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise Executiva Premium | Inteligência Comercial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2b6cb0;
            --primary-dark: #1a365d;
            --accent: #00d2ff;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: #2d3748;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        h1 { 
            margin-top: 0; 
            font-size: 32px; 
            font-weight: 700;
            color: var(--primary-dark);
            letter-spacing: -1px;
        }

        p { 
            color: #718096; 
            margin-bottom: 40px; 
            font-size: 18px;
            font-weight: 300;
        }

        /* Área de Upload Estilizada */
        .upload-area {
            display: block;
            border: 2px dashed #cbd5e0;
            border-radius: 16px;
            padding: 50px 30px;
            background-color: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover { 
            border-color: var(--primary); 
            background-color: #fff;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(43, 108, 176, 0.1);
        }

        #file-name {
            font-size: 16px;
            color: #4a5568;
        }

        #file-name strong {
            color: var(--primary);
            font-size: 18px;
        }

        input[type="file"] { display: none; }

        /* Botão com Efeito de Elevação */
        .btn-submit {
            background: linear-gradient(90deg, var(--primary-dark), var(--primary));
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            margin-top: 30px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(43, 108, 176, 0.3);
        }

        .btn-submit:hover:not(:disabled) { 
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(43, 108, 176, 0.4);
        }

        .btn-submit:disabled { 
            background: #cbd5e0; 
            cursor: not-allowed; 
            box-shadow: none;
        }

        /* Loading Animado */
        #loading { 
            display: none; 
            margin-top: 25px; 
            font-weight: 600; 
            color: var(--primary); 
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Iframe de Resultado */
        #resultado {
            margin-top: 50px;
            width: 100%;
            max-width: 1000px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            display: none;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        #frame-relatorio {
            width: 100%;
            height: 900px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Análise Executiva Premium</h1>
        <p>Transforme dados brutos em inteligência comercial em segundos.</p>

        <label class="upload-area" for="arquivo">
            <div id="file-name">
                <span style="font-size: 40px; display: block; margin-bottom: 10px;">📊</span>
                <strong>Clique para selecionar</strong><br>
                <small>PDF, PPTX, PNG ou JPEG</small>
            </div>
            <input type="file" id="arquivo" accept=".pdf,.pptx,.png,.jpg,.jpeg">
        </label>

        <button class="btn-submit" id="btn-enviar" disabled>Gerar Relatório Analítico</button>
        <div id="loading">🚀 Processando inteligência de mercado...</div>
    </div>

    <div id="resultado">
        <iframe id="frame-relatorio"></iframe>
    </div>

    <script>
        const NGROK_URL = "https://api-relatorio-comercial.onrender.com";
        const fileInput = document.getElementById('arquivo');
        const fileNameDisplay = document.getElementById('file-name');
        const btnEnviar = document.getElementById('btn-enviar');
        const loading = document.getElementById('loading');
        const resultadoContainer = document.getElementById('resultado');
        const frameRelatorio = document.getElementById('frame-relatorio');

        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                fileNameDisplay.innerHTML = `<strong>Arquivo pronto:</strong><br>${this.files[0].name}`;
                btnEnviar.disabled = false;
            } else {
                fileNameDisplay.innerHTML = `<span style="font-size: 40px; display: block; margin-bottom: 10px;">📊</span><strong>Clique para selecionar</strong><br><small>PDF, PPTX, PNG ou JPEG</small>`;
                btnEnviar.disabled = true;
            }
        });

        btnEnviar.addEventListener('click', async function() {
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            btnEnviar.style.display = 'none';
            loading.style.display = 'block';
            resultadoContainer.style.display = 'none';

            try {
                const response = await fetch(`${NGROK_URL}/gerar-relatorio`, {
                    method: 'POST',
                    headers: { "ngrok-skip-browser-warning": "true" },
                    body: formData
                });

                if (!response.ok) throw new Error('Erro na comunicação com a API.');

                const htmlGerado = await response.text();
                frameRelatorio.srcdoc = htmlGerado;
                resultadoContainer.style.display = 'block';
                
                // Scroll suave para o resultado
                setTimeout(() => {
                    resultadoContainer.scrollIntoView({ behavior: 'smooth' });
                }, 500);

            } catch (error) {
                alert("Ocorreu um erro: " + error.message);
                btnEnviar.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
